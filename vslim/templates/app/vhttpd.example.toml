[paths]
root = "__PROJECT_ROOT__"
php_app = "public/worker.php"
php_worker = "__VHTTPD_ROOT__/php/package/bin/php-worker"
vslim_ext = "vslim.so"

[files]
pid_file = "tmp/vslim_template_vhttpd_19888.pid"
event_log = "tmp/vslim_template_vhttpd_19888.events.ndjson"

[runtime]
timezone = "Asia/Shanghai"

[admin]
host = "127.0.0.1"
port = 19988
token = "change-me"

[sites.app]
host = "127.0.0.1"
port = 19888
root = "${paths.root}"
executor = "php"
worker.entry = "${paths.php_worker}"
worker.autostart = true
worker.read_timeout_ms = 3000
worker.socket_prefix = "tmp/vslim_template_worker"
worker.max_requests = 5000
worker.restart_backoff_ms = 500
worker.restart_backoff_max_ms = 8000
php.bin = "php"
app = "${paths.php_app}"
php.extensions = ["${paths.vslim_ext}"]
php.args = []

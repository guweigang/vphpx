[server]
host = "127.0.0.1"
port = 19892

[files]
pid_file = "/tmp/vhttpd_vslim_liveview.pid"
event_log = "/tmp/vhttpd_vslim_liveview.events.ndjson"

[worker]
autostart = true
read_timeout_ms = 60000
websocket_dispatch = true
pool_size = 4
socket = "/tmp/vslim_liveview_demo.sock"
cmd = "php -d extension=/Users/guweigang/Source/vphpx/vslim/vslim.so /Users/guweigang/Source/vhttpd/php/package/bin/php-worker"

[worker.env]
VHTTPD_APP = "/Users/guweigang/Source/vphpx/vslim/examples/liveview_app.php"
VSLIM_LIVEVIEW_LOG = "/tmp/vslim_liveview.worker.log"

[admin]
host = "127.0.0.1"
port = 19992
token = ""

[assets]
enabled = true
prefix = "/assets"
root = "/Users/guweigang/Source/vphpx/vslim/examples/public"
cache_control = "public, max-age=3600"

[paths]
root = ".."
php_app = "vslim/examples/liveview_app.php"
php_worker = "../vhttpd/php/package/bin/php-worker"
vslim_ext = "vslim/vslim.so"
public_root = "vslim/examples/public"

[files]
pid_file = "tmp/vhttpd_vslim_liveview.pid"
event_log = "tmp/vhttpd_vslim_liveview.events.ndjson"

[runtime]
timezone = "Asia/Shanghai"

[worker.env]
VSLIM_LIVEVIEW_LOG = "tmp/vslim_liveview.worker.log"

[admin]
host = "127.0.0.1"
port = 19992
token = "change-me"

[assets]
enabled = true
prefix = "/assets"
root = "${paths.public_root}"
cache_control = "public, max-age=3600"

[sites.liveview]
host = "127.0.0.1"
port = 19892
root = "${paths.root}"
executor = "php"
worker.entry = "${paths.php_worker}"
worker.autostart = true
worker.read_timeout_ms = 60000
worker.websocket_dispatch = true
worker.pool_size = 4
worker.socket_prefix = "tmp/vslim_liveview_demo"
worker.max_requests = 5000
worker.restart_backoff_ms = 500
worker.restart_backoff_max_ms = 8000
app = "${paths.php_app}"
php.bin = "php"
php.extensions = ["${paths.vslim_ext}"]
php.args = []

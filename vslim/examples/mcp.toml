[paths]
root = ".."
php_app = "vslim/examples/mcp_app.php"
php_worker = "../vhttpd/php/package/bin/php-worker"
vslim_ext = "vslim/vslim.so"

[files]
pid_file = "tmp/vslim_native_mcp.pid"
event_log = "tmp/vslim_native_mcp.events.ndjson"

[runtime]
timezone = "Asia/Shanghai"

[admin]
enabled = true
host = "127.0.0.1"
port = 19996
token = "change-me"

[mcp]
enabled = true
path = "/mcp"
sampling_capability_policy = "warn"
allowed_origins = ["http://127.0.0.1:19896"]

[sites.mcp]
host = "127.0.0.1"
port = 19896
root = "${paths.root}"
executor = "php"
worker.entry = "${paths.php_worker}"
worker.autostart = true
worker.pool_size = 2
worker.socket_prefix = "tmp/vslim_native_mcp_worker"
worker.max_requests = 5000
worker.restart_backoff_ms = 500
worker.restart_backoff_max_ms = 8000
app = "${paths.php_app}"
php.bin = "php"
php.extensions = ["${paths.vslim_ext}"]
php.args = []

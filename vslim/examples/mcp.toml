[server]
host = "127.0.0.1"
port = 19896

[files]
pid_file = "/tmp/vslim_native_mcp.pid"
event_log = "/tmp/vslim_native_mcp.events.ndjson"

[worker]
autostart = true
pool_size = 2
socket = "/tmp/vslim_native_mcp_worker.sock"
cmd = "php -d extension=/Users/guweigang/Source/vphpx/vslim/vslim.so /Users/guweigang/Source/vhttpd/php/package/bin/php-worker"

[worker.env]
VHTTPD_APP = "/Users/guweigang/Source/vphpx/vslim/examples/mcp_app.php"

[admin]
enabled = true
host = "127.0.0.1"
port = 19996
token = "change-me"

[mcp]
enabled = true
path = "/mcp"
sampling_capability_policy = "warn"
allowed_origins = ["http://127.0.0.1:19896"]

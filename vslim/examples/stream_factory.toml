[paths]
root = ".."
php_app = "vslim/examples/stream_factory_app.php"
php_worker = "../vhttpd/php/package/bin/php-worker"
vslim_ext = "vslim/vslim.so"
public_root = "vslim/examples/public"

[files]
pid_file = "tmp/vhttpd_vslim_stream_factory.pid"
event_log = "tmp/vhttpd_vslim_stream_factory.events.ndjson"

[runtime]
timezone = "Asia/Shanghai"

[worker.env]
OLLAMA_CHAT_URL = "http://127.0.0.1:11434/api/chat"
OLLAMA_MODEL = "qwen2.5:7b-instruct"
OLLAMA_API_KEY = ""
# OLLAMA_STREAM_FIXTURE = "vslim/tests/fixtures/ollama_stream_fixture.ndjson"

[admin]
host = "127.0.0.1"
port = 19990
token = "change-me"

[assets]
enabled = true
prefix = "/assets"
root = "${paths.public_root}"
cache_control = "public, max-age=3600"

[sites.stream_factory]
host = "127.0.0.1"
port = 19890
root = "${paths.root}"
executor = "php"
worker.entry = "${paths.php_worker}"
worker.autostart = true
worker.read_timeout_ms = 60000
worker.socket_prefix = "tmp/vslim_stream_factory_demo"
worker.max_requests = 5000
worker.restart_backoff_ms = 500
worker.restart_backoff_max_ms = 8000
app = "${paths.php_app}"
php.bin = "php"
php.extensions = ["${paths.vslim_ext}"]
php.args = []

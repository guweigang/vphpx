[server]
host = "127.0.0.1"
port = 19890

[files]
pid_file = "/tmp/vhttpd_vslim_stream_factory.pid"
event_log = "/tmp/vhttpd_vslim_stream_factory.events.ndjson"

[worker]
autostart = true
read_timeout_ms = 60000
socket = "/tmp/vslim_stream_factory_demo.sock"
cmd = "php -d extension=/Users/guweigang/Source/vphpx/vslim/vslim.so /Users/guweigang/Source/vhttpd/php/package/bin/php-worker"

[worker.env]
VHTTPD_APP = "/Users/guweigang/Source/vphpx/vslim/examples/stream_factory_app.php"
OLLAMA_CHAT_URL = "http://127.0.0.1:11434/api/chat"
OLLAMA_MODEL = "qwen2.5:7b-instruct"
OLLAMA_API_KEY = ""
# OLLAMA_STREAM_FIXTURE = "/Users/guweigang/Source/vphpx/vslim/tests/fixtures/ollama_stream_fixture.ndjson"

[admin]
host = "127.0.0.1"
port = 19990
token = ""

[assets]
enabled = true
prefix = "/assets"
root = "/Users/guweigang/Source/vphpx/vslim/examples/public"
cache_control = "public, max-age=3600"

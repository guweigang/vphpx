<section id="counter-summary" class="panel stack">
  <p class="eyebrow">Summary Component</p>
  <p class="hint">This card now accepts both direct component events and room-driven component info.</p>
  <div class="meta">
    <span>count: <code id="counter-summary-count">{{ count }}</code></span>
    <span>status: <code id="counter-summary-status">{{ status }}</code></span>
    <span>mode: <code id="counter-summary-mode">{{ mode }}</code></span>
    <span>synced at: <code id="counter-summary-synced-at">{{ synced_at }}</code></span>
    <span>last source: <code id="counter-summary-source">{{ last_source }}</code></span>
    <span>room: <code id="counter-summary-room">{{ room }}</code></span>
  </div>
</section>

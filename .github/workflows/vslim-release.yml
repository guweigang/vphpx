name: VSlim Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'vslim-*'

jobs:
  package:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux amd64 bundle
            runs_on: ubuntu-latest
            platform: linux-amd64
            package_type: binary
            extension_file: vslim.so
            artifact_name: vslim-linux-amd64-binary
            needs_build: true
            emit_only: false
          - name: macos amd64 bundle
            runs_on: macos-15-intel
            platform: macos-amd64
            package_type: binary
            extension_file: vslim.so
            artifact_name: vslim-macos-amd64-binary
            needs_build: true
            emit_only: false
          - name: macos arm64 bundle
            runs_on: macos-15
            platform: macos-arm64
            package_type: binary
            extension_file: vslim.so
            artifact_name: vslim-macos-arm64-binary
            needs_build: true
            emit_only: false
          - name: windows amd64 bundle
            runs_on: windows-latest
            platform: windows-amd64
            package_type: binary
            extension_file: php_vslim.dll
            artifact_name: vslim-windows-amd64-binary
            needs_build: true
            emit_only: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          extensions: zip

      - name: Setup V
        if: matrix.needs_build && runner.os != 'Windows'
        shell: bash
        run: |
          git clone --depth 1 https://github.com/vlang/v.git /tmp/vlang
          make -C /tmp/vlang
          echo "/tmp/vlang" >> "$GITHUB_PATH"
          /tmp/vlang/v version

      - name: Setup V on Windows
        if: matrix.needs_build && runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/vlang/v.git "$env:RUNNER_TEMP\vlang"
          cmd /c "$env:RUNNER_TEMP\vlang\make.bat"
          Add-Content -Path $env:GITHUB_PATH -Value "$env:RUNNER_TEMP\vlang"
          & "$env:RUNNER_TEMP\vlang\v.exe" version

      - name: Setup MSVC on Windows
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install Windows parser tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pythonExe = (Get-Command python).Source
          & $pythonExe -m pip install --user --disable-pip-version-check winflexbison-bin re2c
          $userScripts = (& $pythonExe -c "import sysconfig; print(sysconfig.get_path('scripts', scheme='nt_user'))").Trim()
          Add-Content -Path $env:GITHUB_PATH -Value $userScripts
          $env:Path = "$userScripts;$env:Path"
          $winBison = Join-Path $userScripts "win_bison.exe"
          $winFlex = Join-Path $userScripts "win_flex.exe"
          if (Test-Path $winBison) {
            Copy-Item -Force $winBison (Join-Path $userScripts "bison.exe")
          }
          if (Test-Path $winFlex) {
            Copy-Item -Force $winFlex (Join-Path $userScripts "flex.exe")
          }
          bison --version
          re2c --version

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libcjson-dev libssl-dev libsodium-dev libargon2-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install pkg-config cjson openssl@3 libsodium argon2

      - name: Build VSlim extension
        if: matrix.package_type == 'binary' && runner.os != 'Windows'
        working-directory: vslim
        shell: bash
        env:
          VPHP_V_GC: none
        run: |
          make build

      - name: Build VSlim extension on Windows
        if: runner.os == 'Windows' && matrix.package_type == 'binary'
        working-directory: vslim
        shell: pwsh
        env:
          VPHP_V_GC: none
          VPHP_V_USE_OPENSSL: 0
        run: |
          & v.exe -path ".;..;@vlib" run build.v -emit-only
          .\scripts\build_windows_dll.ps1

      - name: Smoke check binary bundle
        if: matrix.package_type == 'binary' && runner.os != 'Windows'
        working-directory: vslim
        shell: bash
        run: |
          TEST_PHP_EXECUTABLE="$(command -v php)" php ../vphptest/run-tests.php -q --show-all -d extension=./${{ matrix.extension_file }} \
            tests/test_vslim_cli_run_argv.phpt \
            tests/test_vslim_cli_template_bin_entry.phpt \
            tests/test_vslim_psr7_psr17_interface_contracts.phpt \
            tests/test_vslim_template_project_metadata.phpt

      - name: Smoke check binary bundle on Windows
        if: matrix.package_type == 'binary' && runner.os == 'Windows'
        working-directory: vslim
        shell: pwsh
        run: |
          $env:TEST_PHP_EXECUTABLE = (Get-Command php).Source
          php ..\vphptest\run-tests.php -q --show-all -d extension=.\${{ matrix.extension_file }} `
            tests/test_vslim_cli_run_argv.phpt `
            tests/test_vslim_cli_template_bin_entry.phpt `
            tests/test_vslim_psr7_psr17_interface_contracts.phpt `
            tests/test_vslim_template_project_metadata.phpt

      - name: Build release bundle
        if: runner.os != 'Windows'
        working-directory: vslim
        shell: bash
        env:
          VSLIM_RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
        run: |
          if [ "${{ matrix.package_type }}" = "binary" ]; then
            php scripts/package_release.php \
              --version="${VSLIM_RELEASE_VERSION}" \
              --platform="${{ matrix.platform }}" \
              --package-type=binary \
              --format=zip \
              --ext-path="./${{ matrix.extension_file }}"
          else
            php scripts/package_release.php \
              --version="${VSLIM_RELEASE_VERSION}" \
              --platform="${{ matrix.platform }}" \
              --package-type=source \
              --format=zip
          fi

      - name: Build release bundle on Windows
        if: runner.os == 'Windows'
        working-directory: vslim
        shell: pwsh
        env:
          VSLIM_RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
        run: |
          php scripts/package_release.php `
            --version="${env:VSLIM_RELEASE_VERSION}" `
            --platform="${{ matrix.platform }}" `
            --package-type=binary `
            --format=zip `
            --ext-path=".\${{ matrix.extension_file }}"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: vslim/dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" \
              --draft \
              --title "VSlim $TAG_NAME" \
              --notes "VSlim release bundles for PHP 8.5 across Linux, macOS, and Windows amd64."
          shopt -s globstar nullglob
          files=(dist/**/*.zip)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release bundles found."
            exit 1
          fi
          gh release upload "$TAG_NAME" "${files[@]}" --clobber

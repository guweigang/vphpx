name: Sync vphp Repo

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Source ref to split and publish
        required: false
        default: main
        type: string
      publish_tag:
        description: Optional tag to create in guweigang/vphp
        required: false
        default: ''
        type: string
  push:
    branches:
      - main
    paths:
      - 'vphp/**'
      - '.github/workflows/vphp-sync.yml'
    tags:
      - 'vphp-*'

jobs:
  sync:
    name: split vphp and push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.ref }}
          persist-credentials: false

      - name: Validate push token
        shell: bash
        run: |
          if [ -z "${{ secrets.VPHP_REPO_PUSH_TOKEN }}" ]; then
            echo "Missing secret VPHP_REPO_PUSH_TOKEN" >&2
            exit 1
          fi

      - name: Configure git identity
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Split vphp subtree
        shell: bash
        run: |
          git subtree split --prefix=vphp --branch vphp-split

      - name: Add mirror repository notice
        shell: bash
        run: |
          worktree="$(mktemp -d)"
          git worktree add "$worktree" vphp-split
          cd "$worktree"

          notice="$(mktemp)"
          cat > "$notice" <<'EOF'
          > [!IMPORTANT]
          > This repository is synchronized from
          > [guweigang/vphpx](https://github.com/guweigang/vphpx).
          >
          > Please do not open pull requests against this repository directly.
          > Open issues and pull requests in
          > [guweigang/vphpx](https://github.com/guweigang/vphpx) instead.

          EOF
          cat README.md >> "$notice"
          mv "$notice" README.md

          cat > CONTRIBUTING.md <<'EOF'
          # Contributing

          This repository is synchronized from
          [guweigang/vphpx](https://github.com/guweigang/vphpx).

          Please do not open pull requests against this repository directly.
          Open issues and pull requests in
          [guweigang/vphpx](https://github.com/guweigang/vphpx) instead.
          EOF

          mkdir -p .github
          cat > .github/pull_request_template.md <<'EOF'
          This repository is synchronized from https://github.com/guweigang/vphpx.

          Please do not open pull requests here. Open the pull request against vphpx instead:

          https://github.com/guweigang/vphpx
          EOF

          git add README.md CONTRIBUTING.md .github/pull_request_template.md
          git commit -m "Add vphp mirror repository notice"
          cd -
          git worktree remove "$worktree"

      - name: Push split branch to guweigang/vphp
        shell: bash
        env:
          TARGET_REPO: https://x-access-token:${{ secrets.VPHP_REPO_PUSH_TOKEN }}@github.com/guweigang/vphp.git
        run: |
          git remote add vphp-publish "$TARGET_REPO"
          git push --force vphp-publish vphp-split:main

      - name: Publish tag from workflow input
        if: github.event_name == 'workflow_dispatch' && inputs.publish_tag != ''
        shell: bash
        run: |
          split_sha="$(git rev-parse vphp-split)"
          git tag -f "${{ inputs.publish_tag }}" "$split_sha"
          git push --force vphp-publish "refs/tags/${{ inputs.publish_tag }}"

      - name: Publish tag from monorepo tag
        if: startsWith(github.ref, 'refs/tags/vphp-')
        shell: bash
        run: |
          split_sha="$(git rev-parse vphp-split)"
          target_tag="${GITHUB_REF_NAME#vphp-}"
          git tag -f "$target_tag" "$split_sha"
          git push --force vphp-publish "refs/tags/$target_tag"

name: VSlim Windows Debug

on:
  workflow_dispatch:

env:
  V_VERSION: '0.5.1'
  V_COMMIT: 'fd64037'

jobs:
  windows-smoke:
    name: windows smoke debug
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          extensions: zip

      - name: Setup MSVC on Windows
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Setup V on Windows
        shell: pwsh
        run: |
          $installRoot = Join-Path $env:RUNNER_TEMP "vlang"
          if (Test-Path $installRoot) {
            Remove-Item -Recurse -Force $installRoot
          }
          git clone --depth 1 https://github.com/vlang/v.git $installRoot
          Push-Location $installRoot
          git fetch --depth 1 origin $env:V_COMMIT
          git checkout $env:V_COMMIT
          cmd /c make.bat -msvc
          Pop-Location
          Add-Content -Path $env:GITHUB_PATH -Value $installRoot
          & (Join-Path $installRoot "v.exe") version

      - name: Install Windows parser tools
        shell: pwsh
        run: |
          $pythonExe = (Get-Command python).Source
          & $pythonExe -m pip install --user --disable-pip-version-check winflexbison-bin re2c
          $userScripts = (& $pythonExe -c "import sysconfig; print(sysconfig.get_path('scripts', scheme='nt_user'))").Trim()
          Add-Content -Path $env:GITHUB_PATH -Value $userScripts
          $env:Path = "$userScripts;$env:Path"
          $winBison = Join-Path $userScripts "win_bison.exe"
          $winFlex = Join-Path $userScripts "win_flex.exe"
          if (Test-Path $winBison) {
            Copy-Item -Force $winBison (Join-Path $userScripts "bison.exe")
          }
          if (Test-Path $winFlex) {
            Copy-Item -Force $winFlex (Join-Path $userScripts "flex.exe")
          }
          bison --version
          re2c --version

      - name: Install MariaDB client SDK on Windows
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg "$env:RUNNER_TEMP\vcpkg"
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          & "$env:RUNNER_TEMP\vcpkg\vcpkg.exe" install libmariadb:x64-windows cjson:x64-windows
          $sdkRoot = Join-Path $env:RUNNER_TEMP "vcpkg\installed\x64-windows"
          $mysqlRoot = $sdkRoot
          $cjsonRoot = $sdkRoot
          Add-Content -Path $env:GITHUB_ENV -Value "VSLIM_MYSQL_ROOT=$mysqlRoot"
          Add-Content -Path $env:GITHUB_ENV -Value "VSLIM_CJSON_ROOT=$cjsonRoot"

      - name: Debug Windows SDK layout
        shell: pwsh
        run: |
          Write-Host "VSLIM_MYSQL_ROOT=$env:VSLIM_MYSQL_ROOT"
          Write-Host "VSLIM_CJSON_ROOT=$env:VSLIM_CJSON_ROOT"
          if (Test-Path $env:VSLIM_MYSQL_ROOT) {
            Get-ChildItem -Path $env:VSLIM_MYSQL_ROOT -Depth 3 | Select-Object FullName
          } else {
            Write-Host "MariaDB SDK root missing"
          }

      - name: Build VSlim extension on Windows
        working-directory: vslim
        shell: pwsh
        env:
          VPHP_V_GC: none
          VPHP_V_USE_OPENSSL: 1
          VPHP_V_NO_VSCHANNEL: 1
        run: |
          & cl
          & nmake /?
          & v.exe -cc msvc -path ".;..;@vlib" run build.v -emit-only
          .\scripts\build_windows_dll.ps1

      - name: Smoke check binary bundle on Windows
        working-directory: vslim
        shell: pwsh
        env:
          VSLIM_CLI_DEBUG_FILE: ${{ runner.temp }}\vslim-cli-debug.log
        run: |
          $env:TEST_PHP_EXECUTABLE = (Get-Command php).Source
          $exitCode = 0
          php ..\vphptest\run-tests.php -q --show-all -d extension=.\php_vslim.dll `
            tests/test_vslim_cli_run_argv.phpt `
            tests/test_vslim_cli_template_bin_entry.phpt `
            tests/test_vslim_psr7_psr17_interface_contracts.phpt `
            tests/test_vslim_template_project_metadata.phpt
          if ($LASTEXITCODE -ne 0) {
            $exitCode = $LASTEXITCODE
          }
          if (Test-Path $env:VSLIM_CLI_DEBUG_FILE) {
            Write-Host "==== VSlim CLI debug log ===="
            Get-Content $env:VSLIM_CLI_DEBUG_FILE
          }
          exit $exitCode
